name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-not-for-production
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-secret-not-for-production
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      GROQ_API_KEY: ""
      GEMINI_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Preflight
        run: npm run preflight

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Validate Postgres Prisma schema
        env:
          DATABASE_URL: postgresql://proofticket:proofticket@example.com:5432/proofticket
        run: npx prisma validate --schema prisma/schema.postgres.prisma

      - name: MCP adapter smoke
        run: npm run mcp:smoke

      - name: Redaction smoke
        run: npm run smoke:redaction

      - name: Production preflight
        env:
          DATABASE_URL: postgresql://proofticket:proofticket@example.com:5432/proofticket
          AUTH_URL: https://alpha.example.com
          NEXTAUTH_URL: https://alpha.example.com
          AUTH_SECRET: ci-production-preflight-secret
          NEXTAUTH_SECRET: ci-production-preflight-secret
          GITHUB_CLIENT_ID: ci-github-client-id
          GITHUB_CLIENT_SECRET: ci-github-client-secret
          ENABLE_DEMO_AUTH: "false"
          PROOFTICKET_ALLOWED_EMAILS: builder@example.com
        run: npm run preflight:production

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --audit-level=moderate --omit=dev
